  main:
    lazy-initialization: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: file:./uploads/,classpath:/static/
  jackson:
    serialization:
      fail-on-empty-beans: false

mybatis-plus:
  mapper-locations: classpath*:com/qcq/second_hand/mapper/xml/*.xml
  type-aliases-package: com.qcq.second_hand.entity
  type-handlers-package: com.qcq.second_hand.entity.other
  configuration:
    mapUnderscoreToCamelCase: true
    default-fetch-size: 100
    default-statement-timeout: 30
    call-setters-on-nulls: true

  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      schema-run: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
    include-exception: true

logging:
  level:
    root: DEBUG
    com.qcq.second_hand: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: DEBUG

