server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/second_hand_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: secondhand
    password: 196888mfk
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  main:
    lazy-initialization: true
  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:./uploads/
        - file:./covers/
      add-mappings: true

mybatis-plus:
  mapper-locations: classpath*:com/qcq/second_hand/mapper/xml/*.xml
  type-aliases-package: com.qcq.second_hand.entity
  configuration:
    mapUnderscoreToCamelCase: true
    default-fetch-size: 100
    default-statement-timeout: 30
    call-setters-on-nulls: true

  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      schema-run: false

logging:
  level:
    com.qcq.second_hand: DEBUG
    org.springframework: INFO


app:
  upload:
    path: ./uploads
  cover:
    permanent-path: ./covers
